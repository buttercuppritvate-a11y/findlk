<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phoenix 54</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bungee&family=Bungee+Inline&family=Monoton&family=Orbitron:wght@400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&family=Yellowtail&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#1a0730" />
  <style>
    * { box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --bg: #061019;
      --bg-2: #0b1721;
      --panel: rgba(13, 27, 38, 0.88);
      --panel-strong: rgba(18, 35, 47, 0.96);
      --panel-soft: rgba(140, 184, 211, 0.08);
      --line: rgba(144, 190, 219, 0.42);
      --line-soft: rgba(144, 190, 219, 0.18);
      --accent: #9fc8df;
      --accent-strong: #e7f7ff;
      --accent-soft: rgba(159, 200, 223, 0.14);
      --text: #d9edf7;
      --muted: #a5bdcb;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.44);
      --radius: 24px;
    }

    html {
      width: 100%;
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
      text-rendering: geometricPrecision;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 0%, rgba(159, 200, 223, 0.22), transparent 34rem),
        radial-gradient(circle at 86% 100%, rgba(98, 142, 170, 0.22), transparent 34rem),
        linear-gradient(135deg, #050c13 0%, #0c1a25 48%, #07111a 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 20%, black, transparent 72%);
      opacity: 0.55;
    }

    button,
    textarea {
      font: inherit;
    }

    button:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(220, 244, 255, 0.72);
      outline-offset: 3px;
    }

    .home-page {
      position: relative;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      gap: 18px;
      padding: clamp(16px, 3vw, 34px);
    }

    .home-page.hidden { display: none; }

    .notepad {
      position: relative;
      width: min(960px, 100%);
      height: min(760px, calc(100dvh - 68px));
      background: linear-gradient(180deg, rgba(17, 33, 45, 0.94), rgba(9, 19, 29, 0.96));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.035) inset;
      backdrop-filter: blur(18px);
    }

    .notepad::before {
      content: "NEXUS NOTE PANEL";
      position: absolute;
      right: 18px;
      top: 17px;
      z-index: 2;
      color: rgba(215, 239, 252, 0.38);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      pointer-events: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(6, 15, 23, 0.88), rgba(12, 24, 34, 0.74));
    }

    .tab {
      flex: 1;
      min-height: 48px;
      padding: 12px 10px;
      border: 1px solid transparent;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 150ms ease, background 150ms ease, color 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      background: rgba(159, 200, 223, 0.09);
      color: var(--accent-strong);
      border-color: rgba(159, 200, 223, 0.18);
    }

    .tab.active {
      background: linear-gradient(180deg, rgba(50, 82, 102, 0.88), rgba(26, 49, 65, 0.96));
      color: #ffffff;
      border-color: rgba(205, 234, 250, 0.38);
      box-shadow: 0 0 22px rgba(159, 200, 223, 0.15) inset, 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    textarea.note-area {
      flex: 1;
      width: 100%;
      resize: none;
      border: 0;
      outline: none;
      padding: clamp(18px, 2.6vw, 28px);
      background:
        linear-gradient(transparent 31px, rgba(159, 200, 223, 0.055) 32px),
        linear-gradient(180deg, rgba(17, 31, 42, 0.92), rgba(8, 17, 26, 0.98));
      background-size: auto 32px, auto;
      color: var(--text);
      font-size: 16px;
      line-height: 2;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      caret-color: var(--accent-strong);
    }

    textarea.note-area::placeholder { color: rgba(190, 213, 226, 0.72); }

    .reader-launch {
      width: min(960px, 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(18, 35, 47, 0.90), rgba(10, 22, 32, 0.92));
      box-shadow: 0 20px 58px rgba(0, 0, 0, 0.34), 0 0 0 1px rgba(255, 255, 255, 0.026) inset;
      backdrop-filter: blur(18px);
    }

    .reader-launch-copy {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.52;
    }

    .reader-launch-copy strong {
      display: block;
      color: var(--accent-strong);
      font-size: clamp(18px, 2.2vw, 22px);
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .reader-launch-button {
      min-height: 50px;
      padding: 12px 20px;
      border: 1px solid rgba(205, 234, 250, 0.34);
      border-radius: 16px;
      background: linear-gradient(180deg, #2b536b, #183448);
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease, filter 150ms ease;
      white-space: nowrap;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28), 0 0 22px rgba(159, 200, 223, 0.10) inset;
    }

    .reader-launch-button:hover {
      transform: translateY(-2px);
      border-color: rgba(225, 247, 255, 0.62);
      filter: brightness(1.05);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.34), 0 0 30px rgba(159, 200, 223, 0.14) inset;
    }

    .reader-shell {
      display: none;
      width: 100%;
      min-height: 100dvh;
      background: #07111a;
    }

    .reader-shell.active { display: block; }

    .tab-two-password-screen {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 77, 185, 0.34), transparent 24rem),
        radial-gradient(circle at 82% 16%, rgba(92, 231, 255, 0.26), transparent 26rem),
        radial-gradient(circle at 50% 100%, rgba(255, 154, 102, 0.20), transparent 30rem),
        linear-gradient(135deg, #17072f 0%, #11153e 40%, #083044 72%, #060714 100%);
    }

    .tab-two-password-screen.active { display: flex; }

    .tab-two-password-card {
      width: min(420px, 100%);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      background: rgba(8, 10, 24, 0.82);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.48), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .tab-two-password-title {
      margin: 0 0 8px;
      color: #ffffff;
      font-family: "Bungee Inline", "Bungee", "Impact", sans-serif;
      font-size: clamp(22px, 5vw, 28px);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow: 0 4px 0 rgba(255, 77, 185, 0.24), 0 0 18px rgba(92, 231, 255, 0.20);
    }

    .tab-two-password-copy {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .tab-two-password-input {
      width: 100%;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 15px;
      background: rgba(5, 7, 20, 0.76);
      color: var(--text);
      font-size: 16px;
    }

    .tab-two-password-input::placeholder { color: rgba(200, 210, 239, 0.72); }

    .tab-two-password-error {
      min-height: 20px;
      margin: 10px 0 0;
      color: #ffb4cf;
      font-size: 14px;
    }

    .tab-two-password-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .tab-two-password-button {
      flex: 1;
      min-height: 48px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 15px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
        rgba(9, 12, 28, 0.82);
      color: var(--muted);
      font-family: "Orbitron", "Share Tech Mono", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .tab-two-password-button.primary {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.24);
      background:
        linear-gradient(135deg, rgba(255, 77, 185, 0.88), rgba(159, 103, 255, 0.76) 50%, rgba(92, 231, 255, 0.66));
      box-shadow: 0 0 30px rgba(255, 77, 185, 0.22), 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    .reader-frame {
      width: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      background: #07111a;
    }

    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: rgba(5, 12, 18, 0.82); }
    ::-webkit-scrollbar-thumb {
      background: rgba(159, 200, 223, 0.30);
      border: 3px solid rgba(5, 12, 18, 0.82);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(199, 226, 240, 0.46); }

    @media (max-width: 700px) {
      .home-page {
        justify-content: flex-start;
        gap: 14px;
        padding: 12px 10px;
      }

      .notepad {
        width: 100%;
        height: calc(100dvh - 24px);
        min-height: 330px;
        border-radius: 18px;
      }

      .notepad::before { display: none; }

      .tabs {
        padding: 7px;
        gap: 6px;
      }

      .tab {
        min-height: 48px;
        padding: 10px 6px;
        font-size: 14px;
        border-radius: 12px;
      }

      textarea.note-area {
        padding: 16px;
        font-size: 16px;
        line-height: 1.75;
        background-size: auto 28px, auto;
      }

      .reader-launch {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        padding: 15px;
        border-radius: 18px;
      }

      .reader-launch-button { width: 100%; }
    }

    @media (max-width: 380px) {
      .home-page { padding-inline: 8px; }
      .reader-launch-copy { font-size: 14px; }
      .tab { font-size: 13px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; scroll-behavior: auto !important; }
    }


    /* ANDROID WIDTH FIX:
       The original grid could shrink the notepad to its content width inside Android/Brave.
       These rules force the front notepad to use the real viewport width without touching content or behavior. */
    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    .home-page {
      width: 100%;
      max-width: 100vw;
      grid-template-columns: minmax(0, min(960px, 100%));
      justify-content: center;
      justify-items: stretch;
      align-content: center;
    }

    .notepad,
    .reader-launch {
      width: 100%;
      max-width: 960px;
      justify-self: center;
    }

    @media (max-width: 900px), (pointer: coarse) {
      .home-page {
        width: 100vw;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: 14px;
        padding: 12px 10px;
      }

      .notepad {
        width: 100%;
        max-width: none;
        height: calc(100dvh - 24px);
        min-height: 330px;
        border-radius: 18px;
      }

      .tabs {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .tab {
        min-width: 0;
      }
    }

    @supports (height: 100svh) {
      @media (max-width: 900px), (pointer: coarse) {
        .home-page { min-height: 100svh; }
        .notepad { height: calc(100svh - 24px); }
      }
    }


    /* === VICE CITY / MIAMI NIGHT THEME UPGRADE ===
       Styling-only layer: preserves Phoenix content, tabs, reader iframe, and Android fixes. */
    :root {
      --bg: #080816;
      --bg-2: #1a0730;
      --bg-top: #1a0730;
      --bg-bottom: #050613;
      --panel: rgba(11, 14, 31, 0.74);
      --panel-strong: rgba(14, 17, 37, 0.94);
      --panel-soft: rgba(255, 77, 185, 0.08);
      --line: rgba(255, 255, 255, 0.16);
      --line-soft: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.28);
      --text: #f7f3ff;
      --muted: #c8d2ef;
      --white: #f8f7ff;
      --pink: #ff4db9;
      --pink-soft: #ff93d6;
      --cyan: #5ce7ff;
      --cyan-soft: #b9fbff;
      --violet: #9f67ff;
      --gold: #ffd76d;
      --sun: #ff9a66;
      --accent: var(--cyan);
      --accent-strong: #ffffff;
      --accent-soft: rgba(92, 231, 255, 0.14);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.52);
      --shadow-pink: 0 0 26px rgba(255, 77, 185, 0.44);
      --shadow-cyan: 0 0 26px rgba(92, 231, 255, 0.32);
      --radius: 28px;
    }

    html { background: #050613; }

    body {
      font-family: "Outfit", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 4%, rgba(255, 77, 185, 0.34), transparent 24rem),
        radial-gradient(circle at 88% 12%, rgba(92, 231, 255, 0.24), transparent 28rem),
        radial-gradient(circle at 50% 108%, rgba(255, 154, 102, 0.24), transparent 34rem),
        linear-gradient(180deg, #1a0730 0%, #090b1d 42%, #050613 100%);
    }

    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 77, 185, 0.05), transparent 42%, rgba(92, 231, 255, 0.04));
      background-size: 38px 38px, 38px 38px, auto;
      mask-image: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.92) 11%, rgba(0, 0, 0, 0.95) 82%, transparent);
      opacity: 0.48;
    }

    body::after {
      content: "";
      position: fixed;
      left: 50%;
      top: 84px;
      width: min(680px, 88vw);
      height: min(680px, 88vw);
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        linear-gradient(180deg, rgba(255, 215, 109, 0.78) 0%, rgba(255, 154, 102, 0.72) 30%, rgba(255, 77, 185, 0.46) 70%, rgba(255, 77, 185, 0) 100%);
      filter: blur(16px);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }

    .home-page {
      isolation: isolate;
      background:
        radial-gradient(circle at 22% 12%, rgba(255, 77, 185, 0.11), transparent 18rem),
        radial-gradient(circle at 82% 78%, rgba(92, 231, 255, 0.10), transparent 22rem);
    }

    .home-page > * { position: relative; z-index: 1; }

    .home-page > .tab-two-password-screen {
      position: fixed;
      inset: 0;
      z-index: 40;
    }

    .notepad {
      border: 1px solid rgba(255, 255, 255, 0.17);
      background:
        linear-gradient(135deg, rgba(255, 77, 185, 0.11), transparent 36%),
        linear-gradient(315deg, rgba(92, 231, 255, 0.10), transparent 38%),
        linear-gradient(180deg, rgba(25, 12, 46, 0.90), rgba(6, 8, 20, 0.96));
      box-shadow:
        var(--shadow),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 38px rgba(255, 77, 185, 0.16),
        0 0 42px rgba(92, 231, 255, 0.10);
    }

    .notepad::before {
      content: "PHOENIX FM // VICE NOTE PANEL";
      font-family: "Share Tech Mono", Consolas, monospace;
      color: rgba(185, 251, 255, 0.54);
      text-shadow: 0 0 18px rgba(92, 231, 255, 0.24);
    }

    .notepad::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 21%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 5px);
      opacity: 0.26;
      mix-blend-mode: screen;
    }

    .tabs {
      position: relative;
      z-index: 3;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(90deg, rgba(255, 77, 185, 0.12), rgba(92, 231, 255, 0.09), rgba(255, 215, 109, 0.08)),
        rgba(5, 6, 18, 0.76);
      backdrop-filter: blur(18px);
    }

    .tab {
      position: relative;
      overflow: hidden;
      font-family: "Orbitron", "Share Tech Mono", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-color: rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
        rgba(7, 10, 24, 0.72);
      color: var(--muted);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
    }

    .tab::before {
      content: "";
      position: absolute;
      inset: auto 12px 7px 12px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
      opacity: 0.42;
    }

    .tab:hover {
      background: rgba(255, 77, 185, 0.10);
      color: var(--white);
      border-color: rgba(255, 147, 214, 0.42);
      box-shadow: 0 0 26px rgba(255, 77, 185, 0.18), 0 12px 26px rgba(0, 0, 0, 0.28);
    }

    .tab.active {
      background:
        linear-gradient(135deg, rgba(255, 77, 185, 0.42), rgba(159, 103, 255, 0.30) 48%, rgba(92, 231, 255, 0.24)),
        rgba(11, 14, 31, 0.88);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.34);
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.28);
      box-shadow: 0 0 28px rgba(255, 77, 185, 0.24), 0 0 24px rgba(92, 231, 255, 0.15) inset, 0 14px 28px rgba(0, 0, 0, 0.30);
    }

    textarea.note-area {
      position: relative;
      z-index: 2;
      font-family: "Outfit", "Segoe UI", system-ui, sans-serif;
      color: #f8f7ff;
      caret-color: var(--pink-soft);
      background:
        linear-gradient(transparent 31px, rgba(92, 231, 255, 0.09) 32px),
        radial-gradient(circle at 12% 0%, rgba(255, 77, 185, 0.14), transparent 22rem),
        linear-gradient(180deg, rgba(11, 14, 31, 0.92), rgba(4, 7, 18, 0.98));
      background-size: auto 32px, auto, auto;
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.04);
    }

    textarea.note-area::placeholder {
      color: rgba(200, 210, 239, 0.72);
    }

    .reader-shell,
    .reader-frame {
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 77, 185, 0.18), transparent 26rem),
        radial-gradient(circle at 88% 12%, rgba(92, 231, 255, 0.14), transparent 26rem),
        linear-gradient(180deg, #1a0730, #050613);
    }

    .reader-launch {
      border-color: rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(135deg, rgba(255, 77, 185, 0.14), rgba(92, 231, 255, 0.08)),
        rgba(9, 12, 26, 0.76);
    }

    .reader-launch-copy strong {
      font-family: "Bebas Neue", "Arial Narrow", sans-serif;
      letter-spacing: 0.06em;
      color: var(--gold);
    }

    .reader-launch-button {
      font-family: "Orbitron", "Share Tech Mono", sans-serif;
      letter-spacing: 0.06em;
      border-color: rgba(255, 147, 214, 0.44);
      background: linear-gradient(135deg, rgba(255, 77, 185, 0.86), rgba(159, 103, 255, 0.72) 54%, rgba(92, 231, 255, 0.62));
      box-shadow: var(--shadow-pink), 0 14px 30px rgba(0, 0, 0, 0.28);
    }

    button:focus-visible,
    textarea:focus-visible {
      outline-color: rgba(185, 251, 255, 0.82);
      box-shadow: 0 0 0 4px rgba(92, 231, 255, 0.16), 0 0 28px rgba(255, 77, 185, 0.18);
    }

    ::selection {
      color: #080816;
      background: var(--cyan-soft);
    }

    ::-webkit-scrollbar-track { background: rgba(5, 6, 19, 0.84); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(255, 77, 185, 0.62), rgba(92, 231, 255, 0.54));
      border-color: rgba(5, 6, 19, 0.84);
    }
    ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, rgba(255, 147, 214, 0.78), rgba(185, 251, 255, 0.68)); }

    @media (max-width: 700px), (pointer: coarse) {
      body::after { top: 42px; opacity: 0.16; }
      .home-page { padding: 10px; }
      .notepad { border-radius: 20px; }
      .tabs { gap: 7px; padding: 8px; }
      .tab { font-size: 12px; letter-spacing: 0.04em; }
      textarea.note-area { line-height: 1.76; background-size: auto 28px, auto, auto; }
    }


    /* === CLEAN GRADIENT BACKGROUND OVERRIDE ===
       Removes decorative background-image layers / fake sun-glow image and uses a smooth suitable gradient. */
    html { background: #050613 !important; }

    body {
      background: linear-gradient(135deg, #17072f 0%, #11153e 34%, #083044 68%, #060714 100%) !important;
      background-attachment: fixed !important;
    }

    body::before,
    body::after {
      content: none !important;
      display: none !important;
      background: none !important;
      background-image: none !important;
    }

    .home-page {
      background: linear-gradient(135deg, rgba(255, 77, 185, 0.10) 0%, rgba(92, 231, 255, 0.08) 48%, rgba(255, 215, 109, 0.07) 100%) !important;
    }

    .reader-shell,
    .reader-frame {
      background: linear-gradient(135deg, #17072f 0%, #11153e 42%, #083044 100%) !important;
    }

    html { background: #050613 !important; }

      background: #050613 !important;

      isolation: isolate;
    }

    body::before,
    body::after {
      content: none !important;
      display: none !important;
      background: none !important;
      background-image: none !important;

    .vice-blur-bg,
    .vice-blur-tint {
      position: fixed;
      pointer-events: none;
      user-select: none;

    .vice-blur-bg {
      inset: -34px;
      z-index: 0;
      background-image: var(--vice-bg-landscape);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(18px) saturate(1.18) brightness(0.62);
      transform: scale(1.07);
      opacity: 0.96;
    }

    .vice-blur-tint {
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 77, 185, 0.22), transparent 34rem),
        radial-gradient(circle at 88% 14%, rgba(92, 231, 255, 0.18), transparent 34rem),
        linear-gradient(135deg, rgba(6, 5, 18, 0.54), rgba(22, 5, 40, 0.46) 42%, rgba(3, 18, 26, 0.58));
      backdrop-filter: blur(1px);
    }

    body > :not(.vice-blur-bg):not(.vice-blur-tint) {
      position: relative;
      z-index: 2;
    }

    .home-page,
    .reader-shell,
    .reader-frame,
    .reader-panel,
    .page-shell,
    main.reader-shell {
      background: transparent !important;
      background-image: none !important;
    }

    .notepad,
    .reader-launch,
    .topbar,
    .page,
    .text-block,
    .site-header,
    .month-nav {
      backdrop-filter: blur(18px) saturate(1.10) !important;
      -webkit-backdrop-filter: blur(18px) saturate(1.10) !important;
    }

    .notepad,
    .reader-launch,
    .topbar,
    .page {
      background-color: rgba(8, 8, 24, 0.68) !important;
    }

    textarea.note-area,
    .text-block {
      background-color: rgba(5, 7, 20, 0.72) !important;
    }



    /* === PASSWORD UNLOCK LOADING FADE ===
       Matches the Article 1 Full Text / Paged View loading fade, but runs on the parent shell
       right after the Tab 2 password unlock succeeds. */
    .reader-shell {
      position: relative;
      overflow: hidden;
    }

    .reader-unlock-transition-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(7, 8, 20, 0.82), rgba(24, 7, 48, 0.74) 46%, rgba(6, 49, 70, 0.58));
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .reader-unlock-transition-overlay.active {
      opacity: 1;
    }

    .reader-unlock-transition-chip {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(11, 14, 31, 0.78);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.34);
      color: #f8f7ff;
      font: 800 12px/1.1 "Orbitron", "Outfit", sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .reader-unlock-transition-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff4db9, #5ce7ff);
      box-shadow: 0 0 18px rgba(92, 231, 255, 0.48);
      animation: reader-unlock-transition-pulse 900ms ease-in-out infinite;
    }

    @keyframes reader-unlock-transition-pulse {
      0%, 100% { transform: scale(0.88); opacity: 0.72; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @media (max-width: 760px), (pointer: coarse) {
      .vice-blur-bg {
        inset: -26px;
        background-image: var(--vice-bg-portrait);
        background-position: center;
        filter: blur(16px) saturate(1.16) brightness(0.60);
        transform: scale(1.06);
      }

      .vice-blur-tint {
        background:
          radial-gradient(circle at 16% 8%, rgba(255, 77, 185, 0.20), transparent 24rem),
          radial-gradient(circle at 86% 10%, rgba(92, 231, 255, 0.14), transparent 24rem),
          linear-gradient(135deg, rgba(6, 5, 18, 0.60), rgba(22, 5, 40, 0.48) 44%, rgba(3, 18, 26, 0.62));
      }
    }
</style>

<body>
  <section id="homePage" class="home-page">
    <div class="notepad" aria-label="Simple tab notepad">
      <div class="tabs">
        <button class="tab active" type="button" onclick="openTab(0)">Tab 1</button>
        <button class="tab" type="button" onclick="openTab(1)">Tab 2</button>
        <button class="tab" type="button" onclick="openTab(2)">Tab 3</button>
      </div>
      <textarea id="note" class="note-area" placeholder="Write your note here..."></textarea>
    </div>

    <div id="tabTwoPasswordScreen" class="tab-two-password-screen" aria-hidden="true">
      <div class="tab-two-password-card" role="dialog" aria-modal="true" aria-labelledby="tabTwoPasswordTitle">
        <h2 id="tabTwoPasswordTitle" class="tab-two-password-title">Tab 2</h2>
        <p class="tab-two-password-copy">Enter the password to decrypt and open Tab 2.</p>
        <input id="tabTwoPasswordInput" class="tab-two-password-input" type="password" placeholder="Password" autocomplete="off" />
        <p id="tabTwoPasswordError" class="tab-two-password-error" role="alert"></p>
        <div class="tab-two-password-actions">
          <button class="tab-two-password-button primary" type="button" onclick="submitTabTwoPassword()">Open Tab 2</button>
          <button class="tab-two-password-button" type="button" onclick="hideTabTwoPasswordScreen()">Cancel</button>
        </div>
      </div>
    </div>

  </section>

  <section id="readerShell" class="reader-shell" aria-label="Article reader page">
    <iframe id="readerFrame" class="reader-frame" title="Article Reader"></iframe>
  </section>

    function installBlurredViceBackground(doc) {
      try {
        if (!doc || !doc.head || !doc.body) return;

        if (!doc.getElementById("blurredViceBackgroundStyle")) {
          const style = doc.createElement("style");
          style.id = "blurredViceBackgroundStyle";
          style.textContent = BLURRED_BACKGROUND_CSS;
          doc.head.appendChild(style);
        }

        if (!doc.getElementById("viceBlurBg")) {
          const bg = doc.createElement("div");
          bg.id = "viceBlurBg";
          bg.className = "vice-blur-bg";
          doc.body.prepend(bg);
        }

        if (!doc.getElementById("viceBlurTint")) {
          const tint = doc.createElement("div");
          tint.id = "viceBlurTint";
          tint.className = "vice-blur-tint";
          const bg = doc.getElementById("viceBlurBg");
          if (bg && bg.nextSibling) doc.body.insertBefore(tint, bg.nextSibling);
          else doc.body.prepend(tint);
        }
      } catch (error) {}
    }

    function applyBlurredBackgroundEverywhere() {
      installBlurredViceBackground(document);

      try {
        const readerDoc = readerFrame && readerFrame.contentDocument;
        installBlurredViceBackground(readerDoc);

        if (readerDoc) {
          readerDoc.querySelectorAll("iframe").forEach(frame => {
            if (!frame.dataset.blurBackgroundHooked) {
              frame.dataset.blurBackgroundHooked = "true";
              frame.addEventListener("load", () => {
                installBlurredViceBackground(frame.contentDocument);
                window.setTimeout(() => installBlurredViceBackground(frame.contentDocument), 80);
              });
            }
            installBlurredViceBackground(frame.contentDocument);
          });
        }
      } catch (error) {}
    }

    let decryptedReaderHtml = "";
    let decryptReaderPromise = null;
    const noteTabs = document.querySelectorAll(".home-page .tab");

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decryptReaderHtml(password) {
      if (decryptedReaderHtml) return decryptedReaderHtml;
      if (decryptReaderPromise) return decryptReaderPromise;
      if (!password) throw new Error("Password required.");
      if (!window.crypto || !window.crypto.subtle) {
        throw new Error("This browser needs Web Crypto support to unlock the encrypted backend.");
      }

      decryptReaderPromise = (async () => {
        const encoder = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey(
          "raw",
          encoder.encode(password),
          { name: "PBKDF2" },
          false,
          ["deriveKey"]
        );
        const key = await window.crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: b64ToBytes(ENCRYPTED_READER_BUNDLE.salt),
            iterations: ENCRYPTED_READER_BUNDLE.iterations,
            hash: "SHA-256"
          },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );
        const plainBuffer = await window.crypto.subtle.decrypt(
          {
            name: "AES-GCM",
            iv: b64ToBytes(ENCRYPTED_READER_BUNDLE.iv)
          },
          key,
          b64ToBytes(ENCRYPTED_READER_BUNDLE.data)
        );
        decryptedReaderHtml = new TextDecoder().decode(plainBuffer);
        return decryptedReaderHtml;
      })();

      try {
        return await decryptReaderPromise;
      } catch (error) {
        decryptReaderPromise = null;
        throw error;
      }
    }

    const PAGE_TWO_TRIGGER_COUNT = 12;
    const PAGE_TWO_TRIGGER_WINDOW_MS = 5000;
    const pageTwoTriggerState = { presses: 0, startedAt: 0 };
    const pageTwoButtonTriggerState = { presses: 0, startedAt: 0 };

    function showTabTwoPasswordScreen() {
      tabTwoPasswordInput.value = "";
      tabTwoPasswordError.textContent = "";
      tabTwoPasswordScreen.classList.add("active");
      tabTwoPasswordScreen.setAttribute("aria-hidden", "false");
      window.setTimeout(() => tabTwoPasswordInput.focus(), 0);
    }

    function hideTabTwoPasswordScreen() {
      tabTwoPasswordScreen.classList.remove("active");
      tabTwoPasswordScreen.setAttribute("aria-hidden", "true");
      tabTwoPasswordError.textContent = "";
      note.focus();
    }

    let readerUnlockTransitionOverlay = null;
    let readerUnlockTransitionTimer = 0;

    function ensureReaderUnlockTransitionOverlay() {
      if (readerUnlockTransitionOverlay && readerUnlockTransitionOverlay.isConnected) {
        return readerUnlockTransitionOverlay;
      }

      const overlay = document.createElement("div");
      overlay.className = "reader-unlock-transition-overlay";
      overlay.innerHTML = '<div class="reader-unlock-transition-chip"><span class="reader-unlock-transition-dot"></span><span>Loading article...</span></div>';
      readerShell.appendChild(overlay);
      readerUnlockTransitionOverlay = overlay;
      return overlay;
    }

    function startReaderUnlockTransition() {
      window.clearTimeout(readerUnlockTransitionTimer);
      const overlay = ensureReaderUnlockTransitionOverlay();
      if (!overlay) return;
      overlay.classList.remove("active");
      overlay.style.display = "flex";
      window.requestAnimationFrame(() => overlay.classList.add("active"));
    }

    function finishReaderUnlockTransition() {
      window.clearTimeout(readerUnlockTransitionTimer);
      const overlay = readerUnlockTransitionOverlay;
      if (!overlay) return;
      overlay.classList.remove("active");
      readerUnlockTransitionTimer = window.setTimeout(() => {
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        if (readerUnlockTransitionOverlay === overlay) readerUnlockTransitionOverlay = null;
      }, 240);
    }

    /* === BACKEND BUTTON LOADING FADE ===
       Reuses the same fade loader on backend-side buttons only.
       Front notepad tabs are untouched because this installs only inside the reader iframe. */
    let backendButtonFadeTimer = 0;
    const BACKEND_BUTTON_FADE_MS = 680;

    function pulseBackendButtonFade() {
      if (!readerShell.classList.contains("active")) return;
      window.clearTimeout(backendButtonFadeTimer);
      startReaderUnlockTransition();
      backendButtonFadeTimer = window.setTimeout(finishReaderUnlockTransition, BACKEND_BUTTON_FADE_MS);
    }

    function isBackendFadeTarget(target) {
      if (!target || !target.closest) return false;
      const control = target.closest('button, a[href], [role="button"], summary, input[type="button"], input[type="submit"], input[type="reset"]');
      if (!control) return false;
      if (control.closest('[data-no-backend-fade="true"]')) return false;
      if (control.disabled || control.getAttribute('aria-disabled') === 'true') return false;
      return true;
    }

    function installBackendButtonFadeInDocument(doc) {
      if (!doc || doc.__backendButtonFadeInstalled) return;
      doc.__backendButtonFadeInstalled = true;

      doc.addEventListener('click', event => {
        if (isBackendFadeTarget(event.target)) pulseBackendButtonFade();
      }, true);

      doc.addEventListener('keydown', event => {
        if ((event.key === 'Enter' || event.key === ' ') && isBackendFadeTarget(event.target)) {
          pulseBackendButtonFade();
        }
      }, true);

      try {
        doc.querySelectorAll('iframe').forEach(hookBackendButtonFadeFrame);
      } catch (error) {}
    }

    function hookBackendButtonFadeFrame(frame) {
      if (!frame || frame.dataset.backendFadeHooked === 'true') return;
      frame.dataset.backendFadeHooked = 'true';

      const installForFrame = () => {
        try { installBackendButtonFadeInDocument(frame.contentDocument); } catch (error) {}
      };

      frame.addEventListener('load', () => {
        window.setTimeout(installForFrame, 0);
        window.setTimeout(installForFrame, 90);
        window.setTimeout(installForFrame, 320);
      }, true);

      installForFrame();
    }

    function installBackendButtonFadeHandlers() {
      try {
        const doc = readerFrame && readerFrame.contentDocument;
        if (!doc) return;
        installBackendButtonFadeInDocument(doc);
        doc.querySelectorAll('iframe').forEach(hookBackendButtonFadeFrame);
      } catch (error) {}
    }

    async function submitTabTwoPassword() {
      const enteredPassword = tabTwoPasswordInput.value;
      if (!enteredPassword) {
        tabTwoPasswordError.textContent = "Enter password.";
        tabTwoPasswordInput.focus();
        return;
      }

      tabTwoPasswordError.textContent = "Unlocking encrypted backend...";
      tabTwoPasswordInput.disabled = true;
      startReaderUnlockTransition();

      try {
        await openReader(1, enteredPassword);
        tabTwoPasswordScreen.classList.remove("active");
        tabTwoPasswordScreen.setAttribute("aria-hidden", "true");
        tabTwoPasswordError.textContent = "";
        tabTwoPasswordInput.value = "";
        window.setTimeout(finishReaderUnlockTransition, 720);
        window.setTimeout(finishReaderUnlockTransition, 1250);
      } catch (error) {
        finishReaderUnlockTransition();
        tabTwoPasswordError.textContent = error && /crypto|web crypto/i.test(String(error.message || error))
          ? "Encrypted backend needs Web Crypto support. Use HTTPS, localhost, or a modern browser."
          : "Wrong password.";
        tabTwoPasswordInput.disabled = false;
        tabTwoPasswordInput.focus();
        tabTwoPasswordInput.select();
      } finally {
        if (!tabTwoPasswordScreen.classList.contains("active")) {
          tabTwoPasswordInput.disabled = false;
        }
      }
    }

    function activateReaderPage(index, attempts = 0) {
      const frameWindow = readerFrame.contentWindow;
      if (frameWindow && typeof frameWindow.openPage === "function") {
        frameWindow.openPage(index);
        return;
      }

      if (attempts < 40) {
        window.setTimeout(() => activateReaderPage(index, attempts + 1), 50);
      }
    }

        "    [pageOneFrame, pageTwoFrame].forEach(frame => {",
        "      if (!frame) return;",
        "      frame.style.transition = 'opacity 220ms ease, transform 260ms ease, filter 260ms ease';",
        "      frame.style.transformOrigin = '50% 50%';",
        "    });",
        "  }",
        "",
        "  function animateVisibleFrame(frame) {",
        "    if (!frame) return;",
        "    configurePageFrames();",
        "    frame.style.opacity = '0.01';",
        "    frame.style.transform = 'translateY(10px) scale(0.994)';",
        "    frame.style.filter = 'saturate(0.96)';",
        "    window.requestAnimationFrame(() => {",
        "      frame.style.opacity = '1';",
        "      frame.style.transform = 'translateY(0) scale(1)';",
        "      frame.style.filter = 'none';",
        "    });",
        "  }",
        "",
        "  function startPageOneTransition() {",
        "    configurePageFrames();",
        "    const overlay = ensurePageOneTransitionOverlay();",
        "    pageOneFrame.dataset.transitioning = 'true';",
        "    pageOneFrame.style.opacity = '0.08';",
        "    pageOneFrame.style.transform = 'scale(0.992)';",
        "    pageOneFrame.style.filter = 'blur(1.5px) saturate(0.94)';",
        "    if (overlay) {",
        "      overlay.style.display = 'flex';",
        "      window.requestAnimationFrame(() => overlay.classList.add('active'));",
        "    }",
        "  }",
        "",
        "  function finishPageOneTransition() {",
        "    configurePageFrames();",
        "    pageOneFrame.style.opacity = '1';",
        "    pageOneFrame.style.transform = 'scale(1)';",
        "    pageOneFrame.style.filter = 'none';",
        "    pageOneFrame.dataset.transitioning = 'false';",
        "    if (!pageOneTransitionOverlay) return;",
        "    const overlay = pageOneTransitionOverlay;",
        "    overlay.classList.remove('active');",
        "    window.setTimeout(() => {",
        "      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);",
        "      if (pageOneTransitionOverlay === overlay) pageOneTransitionOverlay = null;",
        "    }, 220);",
        "  }",
        "",
        "  function getPageOneHtml() {",
        "    return pageOneFullTextMode",
        "      ? PAGE_ONE_HTML.replace('<main class=\"page\">', '<main class=\"page\" data-wishes-pagination-ready=\"true\">')",
        "      : PAGE_ONE_HTML;",
        "  }",
        "",
        "  function loadPageOneFrame(forceReload = false) {",
        "    if (!pageOneFrame) return;",
        "    configurePageFrames();",
        "    const mode = pageOneFullTextMode ? 'full' : 'paged';",
        "    if (!pageOneFrame.dataset.mode) pageOneFrame.dataset.mode = 'paged';",
        "    pageOneFrame.removeAttribute('src');",
        "    if (forceReload || pageOneFrame.dataset.mode !== mode) {",
        "      pageOneFrame.srcdoc = getPageOneHtml();",
        "      pageOneFrame.dataset.mode = mode;",
        "    }",
        "  }",
        "",
        "  function setPageOneFullTextMode(fullText) {",
        "    const nextMode = !!fullText;",
        "    if (pageOneFrame.dataset.transitioning === 'true' || nextMode === pageOneFullTextMode) return;",
        "    pageOneFullTextMode = nextMode;",
        "    startPageOneTransition();",
        "    window.setTimeout(() => loadPageOneFrame(true), 120);",
        "  }",
        "",
        "  function installPageOneViewToggle() {",
        "    try {",
        "      const doc = pageOneFrame && pageOneFrame.contentDocument;",
        "      if (!doc) return;",
        "      doc.querySelectorAll('.page-one-view-toggle, .page-one-view-toggle-wrap').forEach(node => node.remove());",
        "      const page = doc.querySelector('.page');",
        "      if (!page) return;",
        "      const makeButton = () => {",
        "        const button = doc.createElement('button');",
        "        button.type = 'button';",
        "        button.className = 'wishes-page-button page-one-view-toggle';",
        "        button.textContent = pageOneFullTextMode ? 'Paged View' : 'Full Text View';",
        "        button.addEventListener('click', () => setPageOneFullTextMode(!pageOneFullTextMode));",
        "        return button;",
        "      };",
        "      if (pageOneFullTextMode) {",
        "        const controls = doc.createElement('nav');",
        "        controls.className = 'wishes-page-controls page-one-view-toggle-wrap';",
        "        controls.setAttribute('aria-label', 'Article 1 view options');",
        "        controls.append(makeButton());",
        "        page.insertBefore(controls, page.firstChild);",
        "        return;",
        "      }",
        "      doc.querySelectorAll('.wishes-page-controls').forEach(nav => {",
        "        nav.append(makeButton());",
        "      });",
        "    } catch (error) {}",
        "  }",
        "",
        "  if (!pageOneFrame.dataset.mode) pageOneFrame.dataset.mode = 'paged';",
        "  configurePageFrames();",
        "  pageOneFrame.addEventListener('load', () => {",
        "    installPageOneViewToggle();",
        "    window.setTimeout(finishPageOneTransition, 70);",
        "  });",
        "  installPageOneViewToggle();",
        "",
        "  const originalOpenPage = window.openPage;",
        "  window.openPage = function (index) {",
        "    if (index === 0) loadPageOneFrame();",
        "    const result = originalOpenPage(index);",
        "    window.requestAnimationFrame(() => animateVisibleFrame(index === 0 ? pageOneFrame : pageTwoFrame));",
        "    return result;",
        "  };",
        "  animateVisibleFrame(pageOneFrame);",
        "})();"
      ].join("\n");
      frameDocument.body.appendChild(script);
      script.remove();
    }

    async function openReader(targetPage = 0, password = "") {
      notes[activeTab] = note.value;
      if (!readerLoaded || readerFrame.srcdoc === "") {
        const unlockedHtml = await decryptReaderHtml(password);
        readerFrame.srcdoc = unlockedHtml;
        readerLoaded = true;
      }
      installReaderArticleOneFullTextToggle();
      installBackendButtonFadeHandlers();
      window.setTimeout(installBackendButtonFadeHandlers, 120);
      window.setTimeout(installBackendButtonFadeHandlers, 420);
      readerFrame.style.transition = "opacity 220ms ease, transform 260ms ease, filter 260ms ease";
      readerFrame.style.opacity = "0.01";
      readerFrame.style.transform = "translateY(12px) scale(0.994)";
      readerFrame.style.filter = "saturate(0.94)";
      homePage.classList.add("hidden");
      readerShell.classList.add("active");
      window.requestAnimationFrame(() => {
        readerFrame.style.opacity = "1";
        readerFrame.style.transform = "translateY(0) scale(1)";
        readerFrame.style.filter = "none";
      });
      activateReaderPage(targetPage);
      window.setTimeout(applyBlurredBackgroundEverywhere, 80);
      window.setTimeout(applyBlurredBackgroundEverywhere, 360);
    }

    function registerPageTwoTrigger(triggerState = pageTwoTriggerState, onComplete = showTabTwoPasswordScreen) {
      const now = Date.now();
      if (!triggerState.startedAt || now - triggerState.startedAt > PAGE_TWO_TRIGGER_WINDOW_MS) {
        triggerState.startedAt = now;
        triggerState.presses = 0;
      }

      triggerState.presses += 1;

      if (triggerState.presses >= PAGE_TWO_TRIGGER_COUNT) {
        triggerState.presses = 0;
        triggerState.startedAt = 0;
        onComplete();
      }
    }

    function openTab(index) {
      notes[activeTab] = note.value;
      activeTab = index;
      note.value = notes[activeTab];
      noteTabs.forEach(button => button.classList.remove("active"));
      noteTabs[activeTab].classList.add("active");

      if (index === 1) {
        registerPageTwoTrigger(pageTwoButtonTriggerState, showTabTwoPasswordScreen);
      }

      note.focus();
    }

    document.addEventListener("keydown", event => {
      if (event.key === "Tab") {
        registerPageTwoTrigger();
      }
    });

    tabTwoPasswordInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        submitTabTwoPassword();
      } else if (event.key === "Escape") {
        event.preventDefault();
        hideTabTwoPasswordScreen();
      }
    });

    function goBackToNotepad() {
      tabTwoPasswordScreen.classList.remove("active");
      tabTwoPasswordScreen.setAttribute("aria-hidden", "true");
      readerShell.classList.remove("active");
      homePage.classList.remove("hidden");
      note.focus();
    }



    applyBlurredBackgroundEverywhere();

    readerFrame.addEventListener("load", () => {
      window.setTimeout(finishReaderUnlockTransition, 180);
      installBackendButtonFadeHandlers();
      window.setTimeout(installBackendButtonFadeHandlers, 120);
      window.setTimeout(installBackendButtonFadeHandlers, 420);
      applyBlurredBackgroundEverywhere();
      window.setTimeout(applyBlurredBackgroundEverywhere, 90);
      window.setTimeout(applyBlurredBackgroundEverywhere, 350);
      window.setTimeout(applyBlurredBackgroundEverywhere, 900);
    });

    window.openTab = openTab;
    window.openReader = openReader;
    window.goBackToNotepad = goBackToNotepad;
    window.submitTabTwoPassword = submitTabTwoPassword;
    window.hideTabTwoPasswordScreen = hideTabTwoPasswordScreen;
  </script>
</body>
</html>
